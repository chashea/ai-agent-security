name: Bootstrap Foundry OIDC

# One-time setup. Creates an Entra app registration + service principal,
# adds a federated credential trusting this repo's `foundry` environment,
# and grants the SP the roles required by Deploy.ps1 -FoundryOnly. Run
# once per target subscription, then copy the printed variables into
# Settings -> Environments -> foundry -> Variables, and the regular
# "Deploy Foundry (OIDC)" workflow can run.
#
# Auth model: az login --use-device-code. The runner prints a URL + code
# in the live log; sign in as a user with:
#   - Application Administrator (or higher) in Entra (creates app reg)
#   - Owner OR User Access Administrator on the target subscription
#     (assigns RBAC to the new SP)

on:
  workflow_dispatch:
    inputs:
      tenant_id:
        description: "Entra tenant ID (GUID)"
        required: true
        type: string
      subscription_id:
        description: "Target Azure subscription ID (GUID)"
        required: true
        type: string
      app_name:
        description: "App registration display name"
        required: false
        default: "github-aiagentsec-deploy"
        type: string
      environment_name:
        description: "GitHub environment name (must match deploy-foundry.yml `environment:`)"
        required: false
        default: "foundry"
        type: string

permissions:
  contents: read

concurrency:
  group: bootstrap-foundry-oidc
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Azure device-code login
        env:
          TENANT_ID: ${{ inputs.tenant_id }}
        run: |
          set -euo pipefail
          echo "::warning::Device code prints below. Open the URL, paste the code, sign in within ~15 minutes."
          az login --use-device-code --tenant "$TENANT_ID" --only-show-errors

      - name: Select subscription
        env:
          SUB: ${{ inputs.subscription_id }}
        run: az account set --subscription "$SUB"

      - name: Create or reuse app registration + service principal
        id: appreg
        env:
          APP_NAME: ${{ inputs.app_name }}
        run: |
          set -euo pipefail
          APP_ID=$(az ad app list --display-name "$APP_NAME" --query "[0].appId" -o tsv)
          if [ -z "$APP_ID" ]; then
            echo "Creating app registration '$APP_NAME'..."
            APP_ID=$(az ad app create --display-name "$APP_NAME" --query appId -o tsv)
          else
            echo "Reusing existing app '$APP_NAME' ($APP_ID)"
          fi

          if ! az ad sp show --id "$APP_ID" >/dev/null 2>&1; then
            echo "Creating service principal..."
            az ad sp create --id "$APP_ID" >/dev/null
          fi
          SP_OBJECT_ID=$(az ad sp show --id "$APP_ID" --query id -o tsv)

          echo "app_id=$APP_ID"             >> "$GITHUB_OUTPUT"
          echo "sp_object_id=$SP_OBJECT_ID" >> "$GITHUB_OUTPUT"

      - name: Federated credential (environment-scoped)
        env:
          APP_ID: ${{ steps.appreg.outputs.app_id }}
          ENV_NAME: ${{ inputs.environment_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          FIC_NAME="github-${ENV_NAME}"
          SUBJECT="repo:${REPO}:environment:${ENV_NAME}"

          EXISTING_SUBJECT=$(az ad app federated-credential list --id "$APP_ID" \
            --query "[?name=='$FIC_NAME'].subject | [0]" -o tsv)
          if [ -n "$EXISTING_SUBJECT" ]; then
            if [ "$EXISTING_SUBJECT" = "$SUBJECT" ]; then
              echo "FIC '$FIC_NAME' already correct."
            else
              echo "FIC '$FIC_NAME' exists with WRONG subject ($EXISTING_SUBJECT). Fix in Entra portal then rerun."
              exit 1
            fi
          else
            cat > /tmp/fic.json <<EOF
          {
            "name": "$FIC_NAME",
            "issuer": "https://token.actions.githubusercontent.com",
            "subject": "$SUBJECT",
            "audiences": ["api://AzureADTokenExchange"]
          }
          EOF
            az ad app federated-credential create --id "$APP_ID" --parameters /tmp/fic.json
            rm /tmp/fic.json
          fi

      - name: Assign roles at subscription scope
        env:
          SP_OBJECT_ID: ${{ steps.appreg.outputs.sp_object_id }}
          SUB: ${{ inputs.subscription_id }}
        run: |
          set -euo pipefail
          SCOPE="/subscriptions/$SUB"
          ROLES=(
            "Contributor"
            "User Access Administrator"
            "Cognitive Services Contributor"
            "Search Service Contributor"
            "Search Index Data Contributor"
          )
          for ROLE in "${ROLES[@]}"; do
            EXISTS=$(az role assignment list --assignee "$SP_OBJECT_ID" --scope "$SCOPE" \
              --role "$ROLE" --query "[0].id" -o tsv 2>/dev/null || true)
            if [ -n "$EXISTS" ]; then
              echo "✓ $ROLE already assigned"
            else
              az role assignment create --assignee-object-id "$SP_OBJECT_ID" \
                --assignee-principal-type ServicePrincipal \
                --role "$ROLE" --scope "$SCOPE" >/dev/null
              echo "✓ $ROLE assigned"
            fi
          done
          echo
          echo "Note: Owner on the Foundry account is still required for disableLocalAuth=false."
          echo "Either grant Owner at sub scope manually, or scope it to the account after first deploy creates it."

      - name: Print variables to copy into GitHub environment
        env:
          APP_ID: ${{ steps.appreg.outputs.app_id }}
          TENANT_ID: ${{ inputs.tenant_id }}
          SUB: ${{ inputs.subscription_id }}
          ENV_NAME: ${{ inputs.environment_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          {
            echo "## Bootstrap complete"
            echo
            echo "Open: https://github.com/${REPO}/settings/environments"
            echo "  -> ${ENV_NAME} -> Add variable (Environment variables, NOT secrets)"
            echo
            echo "| Name | Value |"
            echo "|---|---|"
            echo "| \`AZURE_CLIENT_ID\` | \`${APP_ID}\` |"
            echo "| \`AZURE_TENANT_ID\` | \`${TENANT_ID}\` |"
            echo "| \`AZURE_SUBSCRIPTION_ID\` | \`${SUB}\` |"
            echo
            echo "Then dispatch **Deploy Foundry (OIDC)** with tenant_domain + publisher_upn."
            echo
            echo "MCAPS-governed tenants: create the LocalAuth policy exemption first (see README)."
          } >> "$GITHUB_STEP_SUMMARY"

          echo
          echo "==============================================================="
          echo "AZURE_CLIENT_ID       = $APP_ID"
          echo "AZURE_TENANT_ID       = $TENANT_ID"
          echo "AZURE_SUBSCRIPTION_ID = $SUB"
          echo "==============================================================="
