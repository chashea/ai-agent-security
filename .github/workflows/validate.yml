name: Validate PowerShell + Python + Bicep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Cache PSScriptAnalyzer
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.local/share/powershell/Modules/PSScriptAnalyzer
          key: psscriptanalyzer-${{ runner.os }}-v1

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
              Set-PSRepository PSGallery -InstallationPolicy Trusted
              Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          }

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Warning -ExcludeRule PSAvoidUsingWriteHost,PSUseSingularNouns,PSUseBOMForUnicodeEncodedFile
          if ($results) {
              $results | Format-Table -AutoSize
              throw "PSScriptAnalyzer found $($results.Count) issue(s)"
          }
          Write-Host "PSScriptAnalyzer: All checks passed"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -Force -Scope CurrentUser -MinimumVersion 5.0

      - name: Run Pester Tests
        shell: pwsh
        run: |
          $result = Invoke-Pester tests/ -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
              throw "Pester: $($result.FailedCount) test(s) failed"
          }

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Import all modules and load config
        shell: pwsh
        run: |
          foreach ($mod in Get-ChildItem modules/*.psm1) {
              Import-Module $mod.FullName -Force
              Write-Host "Imported: $($mod.Name)"
          }
          $config = Import-LabConfig -ConfigPath config.sample.json
          Write-Host "Config loaded: $($config.labName) (prefix: $($config.prefix))"
          $valid = Test-LabConfigValidity -Config $config
          Write-Host "Config valid: $valid"

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check scripts/

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt pytest

      - name: Run pytest
        run: pytest scripts/tests/ -v

  bicep-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Bicep CLI
        run: az bicep install

      - name: Validate Bicep templates
        run: |
          shopt -s nullglob
          for f in infra/*.bicep; do
            echo "Building $f"
            az bicep build --file "$f"
          done
          echo "Bicep: All templates compiled successfully"
