name: Deploy Foundry (OIDC)

# Manual-only workflow that runs Deploy.ps1 -FoundryOnly against a target
# Azure subscription using OIDC federated credentials. No stored secrets.
#
# Required repo configuration (Settings → Secrets and variables → Actions):
#   Variables:
#     AZURE_CLIENT_ID         App registration / managed identity client ID
#     AZURE_TENANT_ID         Entra tenant ID
#     AZURE_SUBSCRIPTION_ID   Target subscription ID
#
# The federated identity must trust this repo + workflow. Required Azure roles
# on the target subscription/RG:
#   - Contributor              (RG, Foundry account, Bicep deploys)
#   - User Access Administrator (RBAC grants for the agent MI)
#   - Cognitive Services Contributor (Foundry account + project)
#   - Search Service Contributor + Search Index Data Contributor
#   - Owner on the Foundry account *or* the equivalent permissions to flip
#     disableLocalAuth=false (MCAPS-governed tenants need a policy exemption
#     created out-of-band first — see README.md → MCAPS-governed tenants).
#
# Limitations vs. local deploy:
#   - Teams app catalog publish is gracefully skipped (needs interactive
#     Graph admin consent, can't run headless).
#   - Conditional Access / MDCA / test users / EXO labels are not run.

on:
  workflow_dispatch:
    inputs:
      tenant_domain:
        description: "Tenant primary domain (e.g. contoso.onmicrosoft.com)"
        required: true
        type: string
      publisher_upn:
        description: "UPN used for APIM publisher contact + agent identity"
        required: true
        type: string
      prefix:
        description: "Resource name prefix"
        required: false
        default: "AISec"
        type: string
      location:
        description: "Foundry region"
        required: false
        default: "eastus2"
        type: string
      dry_run:
        description: "Run with -WhatIf (no resources created)"
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-foundry-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: foundry
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Azure login (OIDC)
        uses: Azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8  # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Install Bicep
        shell: pwsh
        run: az bicep install

      - name: Cache PowerShell modules
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.local/share/powershell/Modules
          key: psmodules-foundry-${{ runner.os }}-v2

      - name: Install required PowerShell modules
        shell: pwsh
        run: |
          # Test-LabPrerequisites checks for these unconditionally — they all
          # need to be present even when -FoundryOnly + -SkipAuth bypasses
          # the actual EXO/Graph connect.
          $modules = @(
            'ExchangeOnlineManagement',
            'Microsoft.Graph.Authentication',
            'Microsoft.Graph.Users',
            'Microsoft.Graph.Groups',
            'Microsoft.Graph.Identity.SignIns'
          )
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          foreach ($m in $modules) {
            if (-not (Get-Module -ListAvailable -Name $m)) {
              Write-Host "Installing $m..."
              Install-Module -Name $m -Force -Scope CurrentUser -AllowClobber
            } else {
              Write-Host "$m already cached."
            }
          }

      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.4.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Build config.json from sample
        shell: pwsh
        env:
          INPUT_TENANT_DOMAIN: ${{ inputs.tenant_domain }}
          INPUT_PUBLISHER_UPN: ${{ inputs.publisher_upn }}
          INPUT_PREFIX: ${{ inputs.prefix }}
          INPUT_LOCATION: ${{ inputs.location }}
          INPUT_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          $raw = Get-Content config.sample.json -Raw
          $raw = $raw.Replace('<SUBSCRIPTION_ID>',  $env:INPUT_SUBSCRIPTION_ID)
          $raw = $raw.Replace('<TENANT_DOMAIN>',   $env:INPUT_TENANT_DOMAIN)
          $raw = $raw.Replace('<PUBLISHER_UPN>',   $env:INPUT_PUBLISHER_UPN)
          # testUsers/CA/MDCA aren't run under -FoundryOnly; <USER_UPN> just
          # has to be a syntactically valid placeholder for config validation.
          $raw = $raw.Replace('<USER_UPN>',        $env:INPUT_PUBLISHER_UPN)

          $cfg = $raw | ConvertFrom-Json -Depth 50
          $cfg.prefix = $env:INPUT_PREFIX
          if ($cfg.workloads.foundry.PSObject.Properties['location']) {
            $cfg.workloads.foundry.location = $env:INPUT_LOCATION
          }
          # Disable non-Foundry workloads so -FoundryOnly is the canonical path.
          foreach ($name in 'testUsers','conditionalAccess','mdca') {
            if ($cfg.workloads.PSObject.Properties[$name]) {
              $cfg.workloads.$name.enabled = $false
            }
          }

          $cfg | ConvertTo-Json -Depth 50 | Set-Content config.json
          Write-Host "Wrote config.json (prefix=$($cfg.prefix), domain=$($cfg.domain), location=$($cfg.workloads.foundry.location))"

      - name: Deploy Foundry
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          # azure/login@v2 with enable-AzPSSession populates the Az PowerShell
          # context for this runner. Deploy.ps1 -SkipAuth then reuses the
          # already-logged-in `az` and Az contexts.
          $params = @{
            ConfigPath  = 'config.json'
            FoundryOnly = $true
            SkipAuth    = $true
            TenantId    = $env:AZURE_TENANT_ID
          }
          if ($env:DRY_RUN -eq 'true') { $params['WhatIf'] = $true }

          ./Deploy.ps1 @params

      - name: Upload manifest
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.0
        with:
          name: deployment-manifest
          path: |
            manifests/
            logs/
          if-no-files-found: warn
          retention-days: 30
