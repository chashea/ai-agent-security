name: Adversarial smoke (commercial Foundry)

# Runs the 145-attack adversarial smoke harness against the deployed
# AI Gateway (`aisec2-aigw`) in the commercial Azure subscription.
#
# Required repo secrets (one-time):
#   AZURE_CLIENT_ID       — federated-credential app registration with
#                           "Reader" + "API Management Service Reader" on
#                           rg-ai-agent-security
#   AZURE_TENANT_ID       — 119e9fe0-c9d3-4a9d-be8b-c82d03fd0cd4
#   AZURE_SUBSCRIPTION_ID — 2a71b66d-0453-47ed-a081-b0863b91a2e0
#
# Federated credential subject: repo:chashea/ai-agent-security:ref:refs/heads/main
#                              + repo:chashea/ai-agent-security:environment:smoke
#
# Trigger manually from the Actions tab (workflow_dispatch) or wait for
# the daily 13:00 UTC cron.

on:
  schedule:
    - cron: '0 13 * * *'  # 13:00 UTC daily (~09:00 ET)
  workflow_dispatch:
    inputs:
      category:
        description: 'Attack category (blank = all)'
        required: false
        default: ''
      assert:
        description: 'Fail the job on FAIL-complied or coverage breach'
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    environment: smoke
    env:
      RG: rg-ai-agent-security
      APIM: aisec2-aigw
      STARTER_SUB_ID: aisec-demo
      GATEWAY_URL: https://aisec2-aigw.azure-api.net
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install requests azure-identity

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5  # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch APIM starter subscription key
        id: apim
        run: |
          set -euo pipefail
          KEY=$(az apim subscription show \
            --resource-group "$RG" \
            --service-name "$APIM" \
            --subscription-id-key "$STARTER_SUB_ID" \
            --query primaryKey -o tsv)
          if [[ -z "$KEY" || "$KEY" == "null" ]]; then
            echo "::error::Could not retrieve APIM subscription key for $STARTER_SUB_ID"
            exit 1
          fi
          echo "::add-mask::$KEY"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Build synthetic manifest
        env:
          KEY: ${{ steps.apim.outputs.key }}
        run: |
          mkdir -p manifests
          python3 - <<'PY'
          import json, os, datetime
          m = {
            "generatedAt": datetime.datetime.now(datetime.timezone.utc).isoformat(),
            "data": {
              "aiGateway": {
                "gatewayUrl": os.environ["GATEWAY_URL"],
                "openaiPath": "openai",
                "starterSubscriptionKey": os.environ["KEY"],
                "starterSubscriptionId": os.environ["STARTER_SUB_ID"],
                "apimName": os.environ["APIM"],
              }
            }
          }
          with open("manifests/ci-smoke.json", "w") as f:
              json.dump(m, f)
          PY

      - name: Run adversarial smoke
        id: smoke
        run: |
          set +e
          ARGS=(--manifest manifests/ci-smoke.json
                --tenant-stub mngenvmcap659995
                --sleep-between 1.5
                --output logs/smoke-${{ github.run_id }}.json)
          if [[ -n "${{ github.event.inputs.category }}" ]]; then
            ARGS+=(--category "${{ github.event.inputs.category }}")
          fi
          if [[ "${{ github.event.inputs.assert }}" != "false" ]]; then
            ARGS+=(--assert)
          fi
          mkdir -p logs
          python3.12 scripts/attack_via_gateway.py "${ARGS[@]}"
          echo "exit=$?" >> "$GITHUB_OUTPUT"

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: smoke-report-${{ github.run_id }}
          path: logs/smoke-${{ github.run_id }}.json
          if-no-files-found: warn
          retention-days: 30

      - name: Surface summary
        if: always()
        run: |
          if [[ -f logs/smoke-${{ github.run_id }}.json ]]; then
            python3 - <<'PY'
          import json, pathlib
          p = pathlib.Path("logs/smoke-${{ github.run_id }}.json")
          d = json.loads(p.read_text())
          s = d.get("summary", {})
          print("## Smoke summary")
          print(f"- run_id: `{d.get('runId')}`")
          print(f"- elapsed: {d.get('elapsed_s')}s")
          print(f"- gateway: {d.get('gatewayUrl')}")
          for k, v in (s.get("gradeTotals") or {}).items():
              print(f"- {k}: {v}")
          PY
          fi >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job if smoke failed
        if: steps.smoke.outputs.exit != '0'
        run: |
          echo "Smoke harness exited with ${{ steps.smoke.outputs.exit }}"
          exit ${{ steps.smoke.outputs.exit }}
