openapi: 3.0.3
info:
  title: Microsoft Graph Security API (MVP)
  version: 1.0.0
  description: >
    MVP tool surface for the Security Triage Agent read-only persona. Provides
    incident listing and Advanced Hunting KQL query execution against the
    Microsoft Graph Security API. Designed for use as an openapi-type tool in
    Microsoft Foundry agents.
servers:
  - url: https://graph.microsoft.com/v1.0
security:
  - oauth2:
      - https://graph.microsoft.com/.default
paths:
  /security/incidents:
    get:
      operationId: listIncidents
      summary: List security incidents
      description: >
        Retrieve a list of security incidents from Microsoft 365 Defender. Use
        OData query parameters to filter by severity, status, or time range.
        Results are paginated — use $top to control page size. Start here to
        get an overview of active incidents before drilling into details.
      parameters:
        - name: $filter
          in: query
          description: >
            OData filter expression. Examples:
            severity eq 'high' and status eq 'active',
            createdDateTime ge 2024-01-01T00:00:00Z
          schema:
            type: string
        - name: $top
          in: query
          description: Number of results to return. Default 10, maximum 50.
          schema:
            type: integer
            default: 10
            maximum: 50
        - name: $orderby
          in: query
          description: "OData orderby expression. Example: createdDateTime desc"
          schema:
            type: string
        - name: $count
          in: query
          description: Include total count of matching results in the response.
          schema:
            type: boolean
      responses:
        "200":
          description: Successful response with list of incidents.
          content:
            application/json:
              schema:
                type: object
                properties:
                  "@odata.count":
                    type: integer
                    description: Total count of matching incidents when $count=true.
                  value:
                    type: array
                    items:
                      $ref: "#/components/schemas/Incident"
  /security/runHuntingQuery:
    post:
      operationId: runHuntingQuery
      summary: Execute Advanced Hunting KQL query
      description: >
        Run a Kusto Query Language (KQL) query against Microsoft 365 Defender
        Advanced Hunting tables. Use this to investigate alerts, correlate
        signals, and search for indicators of compromise across endpoints,
        email, identity, and cloud app data.


        Advanced Hunting has tenant-wide rate limits of 15 calls/minute and
        1500 calls/hour. Always include time bounds in KQL queries. Prefer
        summarize over raw output to reduce result size and avoid hitting
        row limits.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - Query
              properties:
                Query:
                  type: string
                  description: The KQL query to execute against Advanced Hunting tables.
                Timespan:
                  type: string
                  description: >
                    ISO 8601 duration bounding the query time window.
                    Example: P7D for 7 days, PT1H for 1 hour.
      responses:
        "200":
          description: Query results with schema and row data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  schema:
                    type: array
                    description: Column definitions for the result set.
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        valueType:
                          type: string
                  results:
                    type: array
                    description: Row data matching the query.
                    items:
                      type: object
                      additionalProperties: true
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://login.microsoftonline.com/{tenantId}/oauth2/v2.0/token
          scopes:
            https://graph.microsoft.com/.default: Default scope for Microsoft Graph
  schemas:
    Incident:
      type: object
      properties:
        id:
          type: string
        displayName:
          type: string
        severity:
          type: string
          enum:
            - informational
            - low
            - medium
            - high
        status:
          type: string
          enum:
            - active
            - resolved
            - redirected
        classification:
          type: string
          enum:
            - unknown
            - falsePositive
            - truePositive
            - informationalExpectedActivity
        assignedTo:
          type: string
          nullable: true
        createdDateTime:
          type: string
          format: date-time
        lastUpdateDateTime:
          type: string
          format: date-time
        incidentWebUrl:
          type: string
          format: uri