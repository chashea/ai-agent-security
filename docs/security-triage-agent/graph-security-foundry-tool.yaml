openapi: 3.0.3
info:
  title: Microsoft Graph Security API (Full)
  version: 1.0.0
  description: >
    Full production tool surface for the Security Triage Agent against Microsoft
    Graph Security API. Extends the MVP spec with incident detail retrieval,
    alert listing and detail, threat intelligence host lookups, and Advanced
    Hunting KQL execution. Designed for use as an openapi-type tool in
    Microsoft Foundry agents.
servers:
  - url: https://graph.microsoft.com/v1.0
security:
  - oauth2:
      - https://graph.microsoft.com/.default
paths:
  /security/incidents:
    get:
      operationId: listIncidents
      summary: List security incidents
      description: >
        Retrieve a list of security incidents from Microsoft 365 Defender. Use
        OData query parameters to filter by severity, status, or time range.
        Results are paginated — use $top to control page size. Start here to
        get an overview of active incidents before drilling into details.
      parameters:
        - $ref: "#/components/parameters/FilterParam"
        - name: $top
          in: query
          description: Number of results to return. Default 10, maximum 50.
          schema:
            type: integer
            default: 10
            maximum: 50
        - $ref: "#/components/parameters/OrderByParam"
        - name: $count
          in: query
          description: Include total count of matching results in the response.
          schema:
            type: boolean
      responses:
        "200":
          description: List of incidents.
          content:
            application/json:
              schema:
                type: object
                properties:
                  "@odata.count":
                    type: integer
                    description: Total count of matching incidents when $count=true.
                  value:
                    type: array
                    items:
                      $ref: "#/components/schemas/Incident"
  /security/incidents/{incidentId}:
    get:
      operationId: getIncident
      summary: Get a specific incident by ID
      description: >
        Retrieve detailed information about a single security incident including
        its associated alerts. Use this after listIncidents to drill into a
        specific incident for triage and to see which alerts are correlated
        under the incident.
      parameters:
        - name: incidentId
          in: path
          required: true
          description: The unique identifier of the incident.
          schema:
            type: string
      responses:
        "200":
          description: Incident detail with associated alerts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentDetail"
  /security/runHuntingQuery:
    post:
      operationId: runHuntingQuery
      summary: Execute Advanced Hunting KQL query
      description: >
        Run a Kusto Query Language (KQL) query against Microsoft 365 Defender
        Advanced Hunting tables. Use this to investigate alerts, correlate
        signals, and search for indicators of compromise across endpoints,
        email, identity, and cloud app data.


        Advanced Hunting has tenant-wide rate limits of 15 calls/minute and
        1500 calls/hour. Always include time bounds in KQL queries. Prefer
        summarize over raw output to reduce result size and avoid hitting
        row limits.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HuntingQueryRequest"
      responses:
        "200":
          description: Query results with schema and row data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HuntingQueryResponse"
  /security/alerts_v2:
    get:
      operationId: listAlerts
      summary: List security alerts (v2)
      description: >
        Retrieve a list of security alerts using the v2 schema. Alerts are
        individual detections from Defender services and can be correlated to
        incidents via incidentId. Use OData filters to scope by severity,
        status, service source, or time range.
      parameters:
        - $ref: "#/components/parameters/FilterParam"
        - name: $top
          in: query
          description: Number of results to return. Default 20, maximum 100.
          schema:
            type: integer
            default: 20
            maximum: 100
        - $ref: "#/components/parameters/OrderByParam"
      responses:
        "200":
          description: List of alerts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  value:
                    type: array
                    items:
                      $ref: "#/components/schemas/Alert"
  /security/alerts_v2/{alertId}:
    get:
      operationId: getAlert
      summary: Get a specific alert by ID
      description: >
        Retrieve detailed information about a single security alert. Use this
        after listAlerts or when following an alert reference from an incident
        to get the full alert context.
      parameters:
        - name: alertId
          in: path
          required: true
          description: The unique identifier of the alert.
          schema:
            type: string
      responses:
        "200":
          description: Alert detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
  /security/threatIntelligence/hosts/{hostId}:
    get:
      operationId: getThreatIntelHost
      summary: Get threat intelligence for a host
      description: >
        Look up threat intelligence data for a host by domain name or IP
        address. Returns registration details, first/last seen timestamps, and
        related host pairs. Use this to assess reputation of domains or IPs
        surfaced during alert investigation.
      parameters:
        - name: hostId
          in: path
          required: true
          description: Domain name or IP address to look up.
          schema:
            type: string
      responses:
        "200":
          description: Threat intelligence host data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreatIntelHost"
components:
  parameters:
    FilterParam:
      name: $filter
      in: query
      description: >
        OData filter expression. Examples:
        severity eq 'high' and status eq 'active',
        createdDateTime ge 2024-01-01T00:00:00Z
      schema:
        type: string
    OrderByParam:
      name: $orderby
      in: query
      description: "OData orderby expression. Example: createdDateTime desc"
      schema:
        type: string
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://login.microsoftonline.com/{tenantId}/oauth2/v2.0/token
          scopes:
            https://graph.microsoft.com/.default: Default scope for Microsoft Graph
  schemas:
    Incident:
      type: object
      properties:
        id:
          type: string
        displayName:
          type: string
        severity:
          type: string
          enum:
            - informational
            - low
            - medium
            - high
        status:
          type: string
          enum:
            - active
            - resolved
            - redirected
        classification:
          type: string
          enum:
            - unknown
            - falsePositive
            - truePositive
            - informationalExpectedActivity
        assignedTo:
          type: string
          nullable: true
        createdDateTime:
          type: string
          format: date-time
        lastUpdateDateTime:
          type: string
          format: date-time
        incidentWebUrl:
          type: string
          format: uri
    IncidentDetail:
      allOf:
        - $ref: "#/components/schemas/Incident"
        - type: object
          properties:
            alerts:
              type: array
              description: Alerts associated with this incident.
              items:
                $ref: "#/components/schemas/AlertSummary"
    AlertSummary:
      type: object
      description: Abbreviated alert info as nested within an incident detail.
      properties:
        id:
          type: string
        title:
          type: string
        severity:
          type: string
          enum:
            - informational
            - low
            - medium
            - high
        createdDateTime:
          type: string
          format: date-time
        category:
          type: string
        alertWebUrl:
          type: string
          format: uri
    Alert:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        severity:
          type: string
          enum:
            - informational
            - low
            - medium
            - high
        status:
          type: string
          enum:
            - new
            - inProgress
            - resolved
        category:
          type: string
        serviceSource:
          type: string
          description: >
            The Defender service that raised the alert.
            Example: microsoftDefenderForEndpoint
        createdDateTime:
          type: string
          format: date-time
        alertWebUrl:
          type: string
          format: uri
        incidentId:
          type: string
          nullable: true
          description: ID of the parent incident, if this alert is correlated.
    ThreatIntelHost:
      type: object
      properties:
        id:
          type: string
        firstSeenDateTime:
          type: string
          format: date-time
        lastSeenDateTime:
          type: string
          format: date-time
        registrar:
          type: string
          nullable: true
        registrant:
          type: string
          nullable: true
        hostPairs:
          type: array
          description: Related hosts observed in association with this host.
          items:
            type: object
            properties:
              parentHostId:
                type: string
              childHostId:
                type: string
              linkKind:
                type: string
              firstSeenDateTime:
                type: string
                format: date-time
              lastSeenDateTime:
                type: string
                format: date-time
    HuntingQueryRequest:
      type: object
      required:
        - Query
      properties:
        Query:
          type: string
          description: The KQL query to execute against Advanced Hunting tables.
        Timespan:
          type: string
          description: >
            ISO 8601 duration bounding the query time window.
            Example: P7D for 7 days, PT1H for 1 hour.
    HuntingQueryResponse:
      type: object
      properties:
        schema:
          type: array
          description: Column definitions for the result set.
          items:
            type: object
            properties:
              name:
                type: string
              valueType:
                type: string
        results:
          type: array
          description: Row data matching the query.
          items:
            type: object
            additionalProperties: true